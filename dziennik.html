<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>VULCAN RYBNIK v9.1 - FIXED LOGIN</title>
    <style>
        :root { --v-green: #00875a; --v-blue: #0052cc; --v-dark: #2c3e50; --v-light: #f4f5f7; --v-red: #e74c3c; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; font-size: 12px; }
        body { margin: 0; background: var(--v-light); display: flex; height: 100vh; overflow: hidden; }

        #login-screen { position: fixed; inset: 0; background: var(--v-dark); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: white; padding: 25px; border-radius: 8px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        
        #sidebar { width: 230px; background: #1a252f; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #2c3e50; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .active { background: var(--v-green); }
        
        #main { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        header { background: white; padding: 10px 25px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 5px; border: 1px solid #ddd; margin-bottom: 15px; }

        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        .btn-green { background: var(--v-green); }
        .btn-blue { background: var(--v-blue); }
        .btn-red { background: var(--v-red); }
        
        input, select, textarea { padding: 6px; border: 1px solid #ccc; border-radius: 4px; margin: 2px; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #dee2e6; padding: 6px; text-align: center; }
        
        .item-row { border-left: 5px solid #ccc; padding: 10px; margin: 5px 0; background: #fff; position: relative; border: 1px solid #ddd; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: var(--v-red); color: white; border: none; cursor: pointer; font-size: 9px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--v-green)">VULCAN RYBNIK v9.1</h2>
            <input type="text" id="login-user" placeholder="Login">
            <input type="password" id="login-pass" placeholder="Hasło">
            <button class="btn btn-green" style="width:100%; margin-top:10px;" onclick="handleLogin()">ZALOGUJ</button>
            <p id="sync-info" style="font-size:10px; color:orange; margin-top:15px;">Pobieranie bazy kont...</p>
        </div>
    </div>

    <div id="sidebar">
        <div style="padding:15px; background:#000; font-weight:bold; color:var(--v-green)">TITAN v9.1 CLOUD</div>
        <div class="nav-item active" onclick="showTab('plan')">📅 Plan Lekcji</div>
        <div class="nav-item teacher-only" onclick="showTab('oceny')">📑 Oceny</div>
        <div class="nav-item" onclick="showTab('terminarz')">📝 Sprawdziany</div>
        <div class="nav-item" onclick="showTab('uwagi')">⚠️ Uwagi</div>
        <div id="admin-menu" style="display:none;"><div class="nav-item" onclick="showTab('admin')" style="color:#ffbd2e">⚙️ Zarządzanie</div></div>
        <div class="nav-item" onclick="location.reload()" style="margin-top:auto; color:var(--v-red)">🔒 Wyloguj</div>
    </div>

    <div id="main">
        <header><div id="header-info">Zaloguj się...</div><div id="cloud-status">Chmura: Aktywna</div></header>
        <div class="container">

            <div id="tab-admin" class="tab-pane" style="display:none;">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <div class="card">
                        <h3>Dodaj Ucznia</h3>
                        <input id="u-nam" placeholder="Imię i Nazwisko">
                        <input id="u-log" placeholder="Login">
                        <input id="u-pas" placeholder="Hasło">
                        <button class="btn btn-green" style="width:100%" onclick="addUser('uczen')">DODAJ</button>
                    </div>
                    <div class="card">
                        <h3>Dodaj Nauczyciela</h3>
                        <input id="t-nam" placeholder="Imię i Nazwisko">
                        <input id="t-log" placeholder="Login">
                        <input id="t-pas" placeholder="Hasło">
                        <button class="btn btn-blue" style="width:100%" onclick="addUser('nauczyciel')">DODAJ</button>
                    </div>
                </div>
            </div>

            <div id="tab-plan" class="tab-pane">
                <div class="card">
                    <h3>Plan Lekcji</h3>
                    <table><thead><tr><th>Godz</th><th>Pon</th><th>Wt</th><th>Śr</th><th>Czw</th><th>Pt</th></tr></thead><tbody id="plan-body"></tbody></table>
                </div>
            </div>

            <div id="tab-oceny" class="tab-pane" style="display:none;">
                <div class="card teacher-only">
                    <h3>Wstaw ocenę</h3>
                    <select id="g-student"></select><input type="number" id="g-val" placeholder="Ocena">
                    <button class="btn btn-green" onclick="addGrade()">WSTAW</button>
                </div>
                <div class="card"><table><thead><tr><th>Uczeń</th><th>Oceny</th></tr></thead><tbody id="grades-body"></tbody></table></div>
            </div>

            <div id="tab-terminarz" class="tab-pane" style="display:none;"><div id="exams-container"></div></div>
            <div id="tab-uwagi" class="tab-pane" style="display:none;"><div id="notes-container"></div></div>
        </div>
    </div>

    <script>
        const SYNC_ID = "rybnik_stable_91"; // Nowy kanał, żeby nie było śmieci
        const API = `https://api.keyvalue.xyz/${SYNC_ID}/data`;

        let db = { users: [], grades: [], notes: [], exams: [], plan: Array(8).fill().map((_, i) => [`${8+i}:00`, "", "", "", "", ""]) };
        let currentUser = null;

        async function syncLoad() {
            try {
                const r = await fetch(API);
                if(r.ok) {
                    const data = await r.json();
                    if(data && data.users) db = data;
                    document.getElementById('sync-info').innerText = "Zsynchronizowano. Możesz się zalogować.";
                    document.getElementById('sync-info').style.color = "green";
                    renderAll();
                }
            } catch(e) { console.log("Łączenie..."); }
        }

        async function syncSave() {
            document.getElementById('cloud-status').innerText = "Zapisywanie...";
            await fetch(API, { method: 'POST', body: JSON.stringify(db) });
            document.getElementById('cloud-status').innerText = "Chmura: Aktywna";
        }

        function handleLogin() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;

            // DYREKTOR ZAWSZE DZIAŁA
            if(u === 'KRZZUP25' && p === 'dyrektorsp1rybnik') {
                currentUser = { name: "Dyrektor", role: "admin" };
            } else {
                currentUser = db.users.find(x => x.l === u && x.p === p);
            }

            if(currentUser) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('header-info').innerText = "Witaj, " + currentUser.name;
                if(currentUser.role === 'admin') document.getElementById('admin-menu').style.display = 'block';
                if(currentUser.role === 'uczen') document.querySelectorAll('.teacher-only').forEach(x => x.style.display='none');
                renderAll();
            } else {
                alert("Nieprawidłowy login lub hasło (lub baza jeszcze się nie załadowała)!");
            }
        }

        function addUser(role) {
            const pre = role === 'uczen' ? 'u-' : 't-';
            db.users.push({
                id: Date.now(),
                name: document.getElementById(pre+'nam').value,
                l: document.getElementById(pre+'log').value,
                p: document.getElementById(pre+'pas').value,
                role: role
            });
            syncSave();
        }

        function addGrade() {
            db.grades.push({id: Date.now(), s: document.getElementById('g-student').value, v: document.getElementById('g-val').value});
            syncSave();
        }

        function renderAll() {
            const students = db.users.filter(x => x.role === 'uczen');
            
            // Oceny
            document.getElementById('grades-body').innerHTML = students.map(s => `
                <tr><td>${s.name}</td><td>${db.grades.filter(g => g.s === s.name).map(g => `
                    <span style="background:#eee;border:1px solid #ccc;padding:2px;margin:2px">${g.v}</span>
                `).join('')}</td></tr>
            `).join('');

            // Plan
            const isA = currentUser?.role === 'admin';
            document.getElementById('plan-body').innerHTML = db.plan.map((row, r) => `
                <tr><td>${row[0]}</td>
                ${row.slice(1).map((c, i) => `<td contenteditable="${isA}" onblur="db.plan[${r}][${i+1}]=this.innerText;syncSave()">${c}</td>`).join('')}</tr>
            `).join('');

            // Selecty
            document.getElementById('g-student').innerHTML = students.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-pane').forEach(x => x.style.display = 'none');
            document.getElementById('tab-'+id).style.display = 'block';
        }

        syncLoad();
        setInterval(syncLoad, 4000); // Odświeżanie u innych co 4 sekundy
    </script>
</body>
</html>
